global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "openclaw-agent-stats"
    # Agent throughput and success rate metrics (mocked until exporter is built)
    static_configs:
      - targets: ["webhook-server:8003"]
